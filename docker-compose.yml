version: "3.8"

services:
  # Redis
  redis:
    image: redis:7-alpine
    container_name: hermes-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Hermes API
  hermes-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes-api
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - HERMES_API_KEY=${HERMES_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - hermes_data:/app/data
      - hermes_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # RQ Worker - High Priority
  worker-high:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes-worker-high
    command: python -m rq worker high --url redis://redis:6379/0
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - hermes_data:/app/data
      - hermes_logs:/app/logs
    restart: unless-stopped

  # RQ Worker - Default Priority
  worker-default:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes-worker-default
    command: python -m rq worker default --url redis://redis:6379/0
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - hermes_data:/app/data
      - hermes_logs:/app/logs
    restart: unless-stopped

  # RQ Worker - Low Priority
  worker-low:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes-worker-low
    command: python -m rq worker low --url redis://redis:6379/0
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - hermes_data:/app/data
      - hermes_logs:/app/logs
    restart: unless-stopped

  # RQ Dashboard (opcional - para monitoreo)
  rq-dashboard:
    image: eoranged/rq-dashboard:latest
    container_name: hermes-rq-dashboard
    ports:
      - "127.0.0.1:9181:9181"
    environment:
      - RQ_DASHBOARD_REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  hermes_data:
    driver: local
  hermes_logs:
    driver: local

networks:
  default:
    name: hermes-network
